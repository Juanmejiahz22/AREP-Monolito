server:
  port: 8080

spring:
  application:
    name: twitter-api
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://example.auth0.com/

auth0:
  issuer-uri: https://example.auth0.com/
  audience: https://twitter-api
  frontend-local-url: http://localhost:5173
  frontend-prod-url: https://example.com